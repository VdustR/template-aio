name: Stale Branches

on:
  schedule:
    # Run daily at 2:00 AM UTC (10:00 AM Taiwan time)
    - cron: "0 2 * * *"
  workflow_dispatch: {} # Allow manual trigger

jobs:
  stale-branches:
    name: Delete Stale Branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: crs-k/stale-branches@v8.2.2
        with:
          days-before-stale: 5
          days-before-delete: 7
          pr-check: true
